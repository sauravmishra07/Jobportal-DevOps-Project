version: "3.8"

services:
  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobportal-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/jobportal
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobportal-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  # MongoDB service
  mongodb:
    image: mongo:latest
    container_name: jobportal-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=jobportal
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

# Volumes for persistent data
volumes:
  mongodb_data:
    driver: local

# Networks for inter-container communication
networks:
  default:
    name: jobportal-network
